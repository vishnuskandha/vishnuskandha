<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="340" viewBox="0 0 1600 340">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accentRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff1a1a"/>
      <stop offset="50%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#ff6666"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="340" fill="url(#bgGrad)"/>

  <!-- Scanlines texture -->
  <rect width="1600" height="340" fill="none" stroke="#ffffff04" stroke-width="1">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Grid lines horizontal -->
  <g stroke="#ff000010" stroke-width="1">
    <line x1="0" y1="85" x2="1600" y2="85"/>
    <line x1="0" y1="170" x2="1600" y2="170"/>
    <line x1="0" y1="255" x2="1600" y2="255"/>
  </g>

  <!-- Grid lines vertical -->
  <g stroke="#ff000010" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="340"/>
    <line x1="400" y1="0" x2="400" y2="340"/>
    <line x1="800" y1="0" x2="800" y2="340"/>
    <line x1="1200" y1="0" x2="1200" y2="340"/>
    <line x1="1400" y1="0" x2="1400" y2="340"/>
  </g>

  <!-- Circuit traces left -->
  <g stroke="#ff2222" stroke-width="2" fill="none" opacity="0.6" filter="url(#softGlow)">
    <polyline points="0,80 80,80 80,120 160,120 160,160 240,160"/>
    <polyline points="0,200 60,200 60,240 140,240 140,200 220,200"/>
    <circle cx="80" cy="80" r="4" fill="#ff2222"/>
    <circle cx="160" cy="120" r="4" fill="#ff2222"/>
    <circle cx="60" cy="200" r="4" fill="#ff2222"/>
    <circle cx="140" cy="200" r="4" fill="#ff2222"/>
  </g>

  <!-- Animated pulse on left circuit -->
  <circle cx="0" cy="80" r="3" fill="#ff4444" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite">
      <mpath>
        <path d="M0,80 L80,80 L80,120 L160,120 L160,160 L240,160"/>
      </mpath>
    </animateMotion>
  </circle>

  <!-- Circuit traces right -->
  <g stroke="#ff2222" stroke-width="2" fill="none" opacity="0.6" filter="url(#softGlow)">
    <polyline points="1600,100 1520,100 1520,160 1440,160 1440,200 1360,200"/>
    <polyline points="1600,240 1530,240 1530,180 1450,180 1450,140 1380,140"/>
    <circle cx="1520" cy="100" r="4" fill="#ff2222"/>
    <circle cx="1440" cy="160" r="4" fill="#ff2222"/>
    <circle cx="1530" cy="180" r="4" fill="#ff2222"/>
    <circle cx="1450" cy="140" r="4" fill="#ff2222"/>
  </g>

  <!-- Animated pulse on right circuit -->
  <circle cx="1600" cy="100" r="3" fill="#ff4444" filter="url(#glow)">
    <animateMotion dur="3.5s" repeatCount="indefinite" begin="1s">
      <mpath>
        <path d="M1600,100 L1520,100 L1520,160 L1440,160 L1440,200 L1360,200"/>
      </mpath>
    </animateMotion>
  </circle>

  <!-- Corner brackets left -->
  <g stroke="#ff3333" stroke-width="3" fill="none" opacity="0.8">
    <polyline points="30,20 20,20 20,50"/>
    <polyline points="30,320 20,320 20,290"/>
  </g>

  <!-- Corner brackets right -->
  <g stroke="#ff3333" stroke-width="3" fill="none" opacity="0.8">
    <polyline points="1570,20 1580,20 1580,50"/>
    <polyline points="1570,320 1580,320 1580,290"/>
  </g>

  <!-- Red accent line top -->
  <rect x="300" y="8" width="1000" height="2" fill="url(#accentRed)" filter="url(#glow)" opacity="0.9"/>

  <!-- Red accent line bottom -->
  <rect x="300" y="330" width="1000" height="2" fill="url(#accentRed)" filter="url(#glow)" opacity="0.9"/>

  <!-- Decorative dots top -->
  <g fill="#ff2222" filter="url(#softGlow)">
    <circle cx="300" cy="9" r="4"/>
    <circle cx="800" cy="9" r="4"/>
    <circle cx="1300" cy="9" r="4"/>
    <circle cx="300" cy="331" r="4"/>
    <circle cx="800" cy="331" r="4"/>
    <circle cx="1300" cy="331" r="4"/>
  </g>

  <!-- Animated scanning line -->
  <rect x="0" y="0" width="1600" height="2" fill="url(#accentRed)" opacity="0.15">
    <animate attributeName="y" values="0;340;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.2;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Main Name Text -->
  <text x="800" y="145" font-family="'Courier New', Courier, monospace" font-size="72" font-weight="bold"
        fill="url(#textGrad)" text-anchor="middle" filter="url(#textGlow)" letter-spacing="6">
    VISHNU SKANDHA
  </text>

  <!-- Role tags -->
  <text x="800" y="195" font-family="'Courier New', Courier, monospace" font-size="20"
        fill="#ff555580" text-anchor="middle" letter-spacing="12">
    { FULL-STACK · IoT · AI · EMBEDDED }
  </text>

  <!-- Subtitle -->
  <text x="800" y="248" font-family="'Courier New', Courier, monospace" font-size="18"
        fill="#ffffff60" text-anchor="middle" letter-spacing="4">
    BSc Computer Science @ SRM Institute · Chennai, India
  </text>

  <!-- Blinking cursor -->
  <rect x="1105" y="115" width="3" height="55" fill="#ff2222">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Status indicator -->
  <circle cx="660" cy="287" r="5" fill="#00ff88" filter="url(#softGlow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="675" y="292" font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#00ff8880" letter-spacing="2">OPEN TO OPPORTUNITIES</text>
</svg>
